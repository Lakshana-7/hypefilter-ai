<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    h2 {
      margin: 0 0 4px 0;
      font-size: 18px;
      color: #38bdf8;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }
    .btn {
      width: 100%;
      background-color: #0284c7;
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background-color: #0369a1;
    }
  </style>
</head>
<body>
  <h2>HyperFilter.ai</h2>
  <p>Cut through the noise. See what's real.</p>
  <button id="scan-btn" class="btn">Scan Page</button>

  <script src="popup.js"></script>
</body>
</html>
